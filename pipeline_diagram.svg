<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 640" width="820" height="640" font-family="Segoe UI, Arial, sans-serif">
  <!-- Background -->
  <rect width="820" height="640" fill="#0f1117" rx="16"/>

  <!-- Title -->
  <text x="410" y="38" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="700">NCERT RAG Pipeline — Architecture</text>
  <text x="410" y="58" text-anchor="middle" fill="#64748b" font-size="12">CBSE Class 9 Science · BM25 + Gemini 1.5 Flash</text>

  <!-- ── Nodes ─────────────────────────────────────────── -->

  <!-- Node 1: PDF -->
  <rect x="30" y="90" width="140" height="56" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="100" y="112" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="600">📄 ncert-9.pdf</text>
  <text x="100" y="130" text-anchor="middle" fill="#64748b" font-size="10">NCERT Class 9 · 30 MB</text>

  <!-- Arrow 1→2 -->
  <line x1="170" y1="118" x2="205" y2="118" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="187" y="112" text-anchor="middle" fill="#64748b" font-size="9">pdfplumber</text>

  <!-- Node 2: Extract Text -->
  <rect x="205" y="90" width="155" height="56" rx="10" fill="#1e293b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="282" y="112" text-anchor="middle" fill="#a5b4fc" font-size="11" font-weight="600">extract_text_from_pdf()</text>
  <text x="282" y="130" text-anchor="middle" fill="#64748b" font-size="10">pages[12:] · pure Python</text>

  <!-- Arrow 2→3 -->
  <line x1="360" y1="118" x2="395" y2="118" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Node 3: Block Split -->
  <rect x="395" y="90" width="175" height="56" rx="10" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="482" y="108" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="600">build_structured_blocks()</text>
  <text x="482" y="124" text-anchor="middle" fill="#64748b" font-size="10">is_boundary() detection</text>
  <text x="482" y="138" text-anchor="middle" fill="#64748b" font-size="10">classify: question/example/formula/concept</text>

  <!-- Arrow 3→4 -->
  <line x1="570" y1="118" x2="605" y2="118" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Node 4: Chunking -->
  <rect x="605" y="90" width="185" height="56" rx="10" fill="#1e293b" stroke="#ec4899" stroke-width="1.5"/>
  <text x="697" y="108" text-anchor="middle" fill="#f9a8d4" font-size="11" font-weight="600">chunk_blocks()</text>
  <text x="697" y="124" text-anchor="middle" fill="#64748b" font-size="10">T5 tokenizer · size=25 · overlap=10</text>
  <text x="697" y="138" text-anchor="middle" fill="#64748b" font-size="10">sliding window over each block</text>

  <!-- ── Row 2 ── -->

  <!-- Arrow 4→5 (down) -->
  <line x1="697" y1="146" x2="697" y2="192" stroke="#ec4899" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Node 5: BM25 Index -->
  <rect x="605" y="192" width="185" height="56" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="697" y="214" text-anchor="middle" fill="#fcd34d" font-size="11" font-weight="600">build_bm25_index()</text>
  <text x="697" y="232" text-anchor="middle" fill="#64748b" font-size="10">BM25Okapi · rank-bm25</text>

  <!-- ── Query entry (left) ── -->
  <rect x="30" y="192" width="140" height="56" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <text x="100" y="214" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="600">❓ User Query</text>
  <text x="100" y="232" text-anchor="middle" fill="#64748b" font-size="10">CBSE science question</text>

  <!-- Arrow query → retrieve -->
  <line x1="170" y1="220" x2="205" y2="220" stroke="#10b981" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Node 6: Retrieve -->
  <rect x="205" y="192" width="155" height="56" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <text x="282" y="214" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="600">retrieve(top_k=5)</text>
  <text x="282" y="232" text-anchor="middle" fill="#64748b" font-size="10">BM25 scores → ranked chunks</text>

  <!-- Arrow BM25→retrieve (horizontal) -->
  <line x1="605" y1="220" x2="375" y2="220" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr2)"/>
  <text x="490" y="213" text-anchor="middle" fill="#64748b" font-size="9">index lookup</text>

  <!-- Arrow retrieve → confidence -->
  <line x1="282" y1="248" x2="282" y2="292" stroke="#10b981" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Node 7: Confidence check -->
  <rect x="205" y="292" width="155" height="56" rx="10" fill="#1e293b" stroke="#f97316" stroke-width="1.5"/>
  <text x="282" y="314" text-anchor="middle" fill="#fdba74" font-size="11" font-weight="600">is_low_confidence()</text>
  <text x="282" y="332" text-anchor="middle" fill="#64748b" font-size="10">threshold=0.5 · top-3 scores</text>

  <!-- Arrow confidence → prompt -->
  <line x1="360" y1="320" x2="395" y2="320" stroke="#f97316" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Node 8: build_prompt -->
  <rect x="395" y="292" width="175" height="56" rx="10" fill="#1e293b" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="482" y="314" text-anchor="middle" fill="#67e8f9" font-size="11" font-weight="600">build_prompt()</text>
  <text x="482" y="332" text-anchor="middle" fill="#64748b" font-size="10">grounded context · low-conf fallback</text>

  <!-- Arrow prompt → generate -->
  <line x1="570" y1="320" x2="605" y2="320" stroke="#06b6d4" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Node 9: generate_answer -->
  <rect x="605" y="292" width="185" height="56" rx="10" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="697" y="314" text-anchor="middle" fill="#67e8f9" font-size="11" font-weight="600">generate_answer()</text>
  <text x="697" y="332" text-anchor="middle" fill="#64748b" font-size="10">Gemini 1.5 Flash · REST API</text>

  <!-- Arrow generate → output -->
  <line x1="697" y1="348" x2="697" y2="392" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Node 10: Output -->
  <rect x="605" y="392" width="185" height="56" rx="10" fill="#1e293b" stroke="#84cc16" stroke-width="1.5"/>
  <text x="697" y="414" text-anchor="middle" fill="#bef264" font-size="11" font-weight="600">✅ Answer Output</text>
  <text x="697" y="432" text-anchor="middle" fill="#64748b" font-size="10">Grounded · with confidence flag</text>

  <!-- ── Legend ──────────────────────────────── -->
  <rect x="30" y="490" width="760" height="130" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="410" y="512" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="700">Legend</text>

  <!-- Library badges -->
  <rect x="50" y="524" width="100" height="22" rx="6" fill="#172554"/>
  <text x="100" y="539" text-anchor="middle" fill="#93c5fd" font-size="10">pdfplumber</text>

  <rect x="165" y="524" width="100" height="22" rx="6" fill="#1e1b4b"/>
  <text x="215" y="539" text-anchor="middle" fill="#a5b4fc" font-size="10">transformers (T5)</text>

  <rect x="280" y="524" width="100" height="22" rx="6" fill="#2e1065"/>
  <text x="330" y="539" text-anchor="middle" fill="#c4b5fd" font-size="10">rank-bm25</text>

  <rect x="395" y="524" width="100" height="22" rx="6" fill="#0c4a6e"/>
  <text x="445" y="539" text-anchor="middle" fill="#67e8f9" font-size="10">requests (REST)</text>

  <rect x="510" y="524" width="120" height="22" rx="6" fill="#052e16"/>
  <text x="570" y="539" text-anchor="middle" fill="#6ee7b7" font-size="10">Gemini 1.5 Flash</text>

  <rect x="645" y="524" width="120" height="22" rx="6" fill="#1c1917"/>
  <text x="705" y="539" text-anchor="middle" fill="#d6d3d1" font-size="10">NLTK · stdlib</text>

  <!-- Stats row -->
  <text x="50" y="578" fill="#64748b" font-size="11">📊 Stats:</text>
  <text x="50" y="596" fill="#94a3b8" font-size="10">Source: NCERT Class 9 Science PDF (~30 MB)</text>
  <text x="50" y="612" fill="#94a3b8" font-size="10">Chunks: ~2,000+ · Chunk size: 25 tokens · Overlap: 10</text>

  <text x="430" y="578" fill="#64748b" font-size="11">🎯 Evaluation:</text>
  <text x="430" y="596" fill="#94a3b8" font-size="10">10 CBSE Q&amp;A · 70% correct · 30% partial</text>
  <text x="430" y="612" fill="#94a3b8" font-size="10">Low-confidence triggered on 2/10 queries</text>

  <!-- Arrowhead markers -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748b"/>
    </marker>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="2" refY="3" orient="auto">
      <path d="M8,0 L8,6 L0,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
